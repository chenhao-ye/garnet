# Experiment: scale_clients
# Sweep the number of client threads from 1 to 32.
# Workload: 70% GET / 30% SET (YCSB workload-A-like read-heavy mix).

name: scale_clients
description: "Scale number of client threads (1-32) with 70/30 GET/SET workload"
benchmark: online

base:
  client_params:
    client: GarnetClientSession
    online: true
    op_workload: [GET, SET]
    op_percent: [70, 30]
    dbsize: 100000
    runtime: 30
    disable_console_logger: true
  server_params:
    port: 6379

sweep:
  client_params:
    threads: [1, 2, 4, 8, 16, 32]
