# Experiment: scale_clients
# Sweep the number of client threads from 1 to 32.
# Workload: 70% GET / 30% SET (YCSB workload-A-like read-heavy mix).

name: scale_clients
description: "Scale number of client threads (1-32) with 70/30 GET/SET workload"
benchmark_project: benchmark/Resp.benchmark/Resp.benchmark.csproj

base_params:
  host: 127.0.0.1
  port: 6379
  online: true
  op_workload: [GET, SET]
  op_percent: [70, 30]
  dbsize: 100000
  batchsize: 128
  runtime: 30
  disable_console_logger: true

sweep:
  param: threads
  values: [1, 2, 4, 8, 16, 32]
