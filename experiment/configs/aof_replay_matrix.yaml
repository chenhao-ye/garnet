# Experiment: aof_replay_matrix
# Sweep both the number of AOF physical sublogs and the number of replay tasks
# per physical sublog using the offline AofBench in Replay mode with
# main-memory replication (--aof-null-device, InProc client).
# No external Garnet server is needed - AofBench creates an embedded server.

name: aof_replay_matrix
description: "Sweep AOF physical sublog count and replay task count for replay with main-memory replication (null device, InProc)"
benchmark: aof
no_server: true

base:
  client_params:
    aof_bench: true
    aof_bench_type: Replay
    cluster: true
    aof_null_device: true
    client: InProc
    aof_commit_freq: -1
    aof_memory_size: "256m"

sweep:
  client_params:
    aof_physical_sublog_count: [1, 2, 4, 8]
    aof_replay_task_count: [1, 2, 4, 8]
