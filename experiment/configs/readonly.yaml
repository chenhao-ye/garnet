# Experiment: readonly
# Pure read workload (100% GET). Keys must exist before measuring, so a load
# step pre-populates the server with MSET before the sweep begins.
#
# The `load` section runs a separate non-online benchmark that writes all keys
# once, then the sweep measures pure GET throughput across thread counts.

name: readonly
description: "100% GET workload after server pre-load; sweep threads 1-32"
benchmark_project: benchmark/Resp.benchmark/Resp.benchmark.csproj

base_params:
  host: 127.0.0.1
  port: 6379
  online: true
  op_workload: [GET]
  op_percent: [100]
  dbsize: 100000
  keylength: 8
  valuelength: 64
  batchsize: 128
  runtime: 30
  disable_console_logger: true

# One-time load step: write all keys before any benchmark run.
# Fields here override base_params for the load run only.
# `online`, `skipload`, and `disable_console_logger` are stripped automatically.
load:
  op: MSET
  threads: 8
  batchsize: 4096
  runtime: -1
  totalops: 100000

sweep:
  param: threads
  values: [1, 2, 4, 8, 16, 32]
